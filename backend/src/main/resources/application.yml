server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: enterprise-blog
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:enterprise_blog}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:blog}
    password: ${MYSQL_PASSWORD:blog_pass}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

blog:
  jwt-secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
  jwt-expire-seconds: ${JWT_EXPIRE_SECONDS:315360000}
  upload-dir: ${UPLOAD_DIR:./uploads}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
  backup-dir: ${BACKUP_DIR:./backups}

logging:
  file:
    name: ${LOG_FILE:./logs/blog-api.log}
  level:
    com.example.blog: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: local
server:
  forward-headers-strategy: native
blog:
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: prod
server:
  forward-headers-strategy: framework
blog:
  public-base-url: ${PUBLIC_BASE_URL:https://example.com}
