services:
  mysql:
    image: mysql:9.6
    container_name: blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enterprise_blog}
      MYSQL_USER: ${MYSQL_USER:-blog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blog_pass}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: blog-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: blog-backend
    depends_on:
      - mysql
      - redis
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enterprise_blog}
      MYSQL_USER: ${MYSQL_USER:-blog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blog_pass}
      REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-very-long-random-production-secret}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-315360000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://example.com}
      UPLOAD_DIR: /app/uploads
      BACKUP_DIR: /app/backups
      LOG_FILE: /app/logs/blog-api.log
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/actuator/health/readiness >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: blog-frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: blog-nginx
    depends_on:
      - frontend
      - backend
    volumes:
      - ./deploy/nginx/blog.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
